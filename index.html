<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Corporativo — Boletaenlinea</title>
<link rel="icon" href="https://boletaenlinea.co/wp-content/uploads/2026/01/favicon-2-300x300.png">
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  /* ── VARIABLES ── */
  :root {
    --bel: #0D1E8D;
    --bel-dark: #091466;
    --bel-red: #E8232A;
    --bel-light: #EEF1FA;
    --bel-border: #d4daef;
    --sidebar-w: 210px;
    --header-h: 52px;
    --tabs-h: 38px;
    --status-h: 28px;
    --bg: #ffffff;
    --bg2: #f7f8fc;
    --text: #1a1a2e;
    --text2: #5a6080;
    --text3: #9098b0;
    --border: #e4e8f0;
    --radius: 8px;
    --radius-lg: 12px;
    --shadow: 0 2px 12px rgba(13,30,141,.08);
    --shadow-lg: 0 8px 32px rgba(13,30,141,.15);
  }

  /* ── LAYOUT ── */
  #app { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    background: linear-gradient(140deg, var(--bel-dark) 0%, var(--bel) 55%, #1e3db5 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-box {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%; max-width: 400px;
    box-shadow: 0 40px 100px rgba(0,0,0,.3);
    animation: slideUp .4s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .login-logo { margin-bottom: 28px; text-align: center; }
  .login-logo img { height: 36px; filter: none; }
  .login-logo .logo-fallback { display: none; font-size: 20px; font-weight: 900; color: var(--bel); letter-spacing: -1px; }
  .login-label { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .5px; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .login-input {
    width: 100%; padding: 11px 14px; border-radius: 9px;
    border: 1.5px solid var(--border); font-size: 13.5px;
    outline: none; color: var(--text); margin-bottom: 14px;
    transition: border-color .2s;
  }
  .login-input:focus { border-color: var(--bel); }
  .login-input.error { border-color: var(--bel-red); }
  .login-btn {
    width: 100%; padding: 13px; background: var(--bel); color: #fff;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 800;
    cursor: pointer; transition: background .2s; letter-spacing: .3px;
  }
  .login-btn:hover { background: var(--bel-dark); }
  .login-btn:disabled { background: #aab; cursor: default; }
  .login-error { color: var(--bel-red); font-size: 12.5px; margin-bottom: 14px; display: flex; align-items: center; gap: 5px; }
  .login-shortcuts { background: var(--bel-light); border-radius: 10px; padding: 13px 14px; margin-top: 18px; }
  .login-shortcuts p { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
  .login-shortcuts button {
    display: block; width: 100%; text-align: left; padding: 3px 0;
    background: none; border: none; cursor: pointer; font-size: 11px;
    color: var(--bel); font-family: 'Courier New', monospace; font-weight: 600;
  }
  .login-shortcuts button:hover { color: var(--bel-dark); }

  /* ── HEADER ── */
  #header {
    height: var(--header-h); background: var(--bel);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; flex-shrink: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo img { height: 22px; filter: brightness(0) invert(1); }
  .header-logo .fallback { display: none; font-size: 15px; font-weight: 900; color: white; }
  .header-sep { color: rgba(255,255,255,.25); font-size: 18px; }
  .header-title { color: rgba(255,255,255,.7); font-size: 12px; font-weight: 500; letter-spacing: .3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-save {
    display: flex; align-items: center; gap: 5px; padding: 5px 13px;
    border-radius: 7px; border: 1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.1); color: #fff; cursor: pointer;
    font-size: 11.5px; font-weight: 600; transition: all .2s;
  }
  .btn-save:hover { background: rgba(255,255,255,.18); }
  .btn-save.saved { background: rgba(46,125,50,.75); border-color: rgba(46,125,50,.5); }
  .user-badge { display: flex; align-items: center; gap: 8px; }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(255,255,255,.2); display: flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 800; color: #fff;
  }
  .user-name { color: rgba(255,255,255,.75); font-size: 11.5px; }
  .btn-logout {
    padding: 5px 9px; border-radius: 7px; border: 1px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.07); color: rgba(255,255,255,.65);
    cursor: pointer; font-size: 12px; transition: all .2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,.15); }

  /* ── DEPT TABS ── */
  #dept-tabs {
    height: var(--tabs-h); background: var(--bel-dark);
    display: flex; align-items: flex-end; padding: 0 14px; flex-shrink: 0;
  }
  .dept-tab {
    display: flex; align-items: center; gap: 6px; padding: 8px 15px;
    background: transparent; border: none; cursor: pointer;
    font-size: 12px; font-weight: 400; color: rgba(255,255,255,.55);
    border-radius: 6px 6px 0 0; transition: all .15s; font-family: inherit;
  }
  .dept-tab:hover { color: rgba(255,255,255,.85); background: rgba(255,255,255,.06); }
  .dept-tab.active { background: var(--bg2); color: var(--bel); font-weight: 700; }
  .dept-tab svg { width: 14px; height: 14px; }

  /* ── BODY ── */
  #body { flex: 1; display: flex; overflow: hidden; background: var(--bg2); }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w); min-width: var(--sidebar-w);
    border-right: 1px solid var(--border); background: var(--bg2);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 13px 5px; font-size: 9.5px; font-weight: 700;
    color: var(--text3); text-transform: uppercase; letter-spacing: .1em;
  }
  .pages-list { flex: 1; overflow-y: auto; padding-bottom: 4px; }
  .page-item {
    display: flex; align-items: center; gap: 7px; padding: 8px 10px;
    margin: 1px 5px; cursor: pointer; border-radius: var(--radius);
    font-size: 12.5px; border: 1px solid transparent;
    transition: all .12s; color: var(--text2); user-select: none;
  }
  .page-item:hover { background: var(--bg); color: var(--text); }
  .page-item.active { background: var(--bg); font-weight: 700; }
  .page-item svg { width: 13px; height: 13px; flex-shrink: 0; opacity: .7; }
  .page-item span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .page-del {
    padding: 2px 4px; background: none; border: none; cursor: pointer;
    color: var(--text3); border-radius: 4px; font-size: 13px; line-height: 1;
    opacity: 0; transition: opacity .15s;
  }
  .page-item.active .page-del { opacity: .6; }
  .page-item.active .page-del:hover { opacity: 1; color: var(--bel-red); }
  .page-rename-input {
    width: 100%; font-size: 12px; border: 1px solid var(--bel);
    background: var(--bg); padding: 5px 8px; border-radius: 6px;
    outline: none; color: var(--text); margin: 2px 6px; box-sizing: border-box;
    width: calc(100% - 12px);
  }
  .sidebar-add { padding: 6px 7px; border-top: 1px solid var(--border); }
  .sidebar-add-form { padding: 7px 8px; border-top: 1px solid var(--border); }
  .btn-new-page {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 7px; font-size: 11.5px; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-family: inherit; transition: all .15s;
    background: transparent;
  }
  .btn-new-page:hover { background: var(--bel-light); }
  .add-input {
    width: 100%; font-size: 12px; padding: 7px 9px; border-radius: 7px;
    border: 1.5px solid var(--bel); background: var(--bg); color: var(--text);
    margin-bottom: 5px; outline: none; box-sizing: border-box;
  }
  .add-actions { display: flex; gap: 5px; }
  .btn-create {
    flex: 1; padding: 5px; font-size: 11px; border: none; border-radius: 7px;
    color: #fff; cursor: pointer; font-weight: 700; font-family: inherit;
  }
  .btn-cancel-add {
    padding: 5px 10px; font-size: 11px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--border); background: transparent; color: var(--text2);
    font-family: inherit;
  }
  .empty-dept {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 12px; padding: 32px; text-align: center;
  }
  .empty-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--bel-light); display: flex; align-items: center; justify-content: center;
  }
  .empty-icon svg { width: 26px; height: 26px; }
  .empty-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .btn-empty-add {
    display: flex; align-items: center; gap: 6px; padding: 9px 20px;
    border-radius: 9px; border: 2px solid; background: transparent;
    cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit;
    transition: all .15s;
  }

  /* ── WORKSPACE ── */
  #workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .workspace-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
  }
  .toolbar-breadcrumb { display: flex; align-items: center; gap: 8px; }
  .breadcrumb-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .breadcrumb-dept { font-size: 12px; color: var(--text2); }
  .breadcrumb-page { font-size: 12.5px; font-weight: 700; color: var(--text); }
  .toolbar-actions { display: flex; align-items: center; gap: 5px; }
  .view-btn {
    padding: 5px 11px; font-size: 11.5px; border-radius: 7px; cursor: pointer;
    font-family: inherit; border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-weight: 400; transition: all .15s;
  }
  .view-btn:hover { background: var(--bel-light); }
  .view-btn.active { font-weight: 700; }
  .btn-open {
    display: flex; align-items: center; gap: 4px; padding: 5px 10px;
    font-size: 11.5px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; color: var(--text2);
    font-family: inherit; transition: all .15s;
  }
  .btn-open:hover { background: var(--bg2); }

  /* ── PANELS ── */
  .panels { flex: 1; display: flex; overflow: hidden; }
  .panel-preview { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-editor { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-divider { width: 1px; background: var(--border); flex-shrink: 0; }
  .panel-bar {
    padding: 5px 14px; display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; font-size: 10.5px; font-weight: 600; letter-spacing: .05em;
  }
  .panel-bar.preview { color: rgba(255,255,255,.85); }
  .panel-bar.editor { background: #1a1b2e; color: rgba(255,255,255,.5); }
  .preview-frame { flex: 1; border: none; background: #fff; display: block; }
  .code-editor {
    flex: 1; resize: none; border: none; outline: none;
    padding: 14px 16px; font-family: 'Courier New', 'Cascadia Code', monospace;
    font-size: 12px; line-height: 1.65; background: #1e1e2e;
    color: #cdd6f4; tab-size: 2;
  }

  /* ── STATUS BAR ── */
  #status-bar {
    height: var(--status-h); background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 20px;
    font-size: 10.5px; color: var(--text3); flex-shrink: 0;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #2E7D32; display: inline-block; margin-right: 5px; }
  .status-right { margin-left: auto; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-box {
    background: #fff; border-radius: 16px; padding: 28px;
    max-width: 320px; width: 90%; box-shadow: 0 32px 80px rgba(0,0,0,.25);
    animation: slideUp .2s ease;
  }
  .modal-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 10px; }
  .modal-body { font-size: 13px; color: var(--text2); margin-bottom: 22px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; }
  .btn-modal-cancel {
    flex: 1; padding: 10px; border-radius: 9px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 13px; color: var(--text2); font-family: inherit;
  }
  .btn-modal-del {
    flex: 1; padding: 10px; border-radius: 9px; border: none;
    background: var(--bel-red); cursor: pointer; font-size: 13px; color: #fff;
    font-weight: 800; font-family: inherit;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccd; border-radius: 6px; }

  /* ── METRICS BAR ── */
  #metrics-bar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 36px; display: flex; align-items: center;
    gap: 20px; font-size: 11px; flex-shrink: 0; overflow-x: auto;
  }
  .metric-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; color: var(--text2); }
  .metric-item strong { color: var(--text); }
  .metric-sep { color: var(--border); }
  .metric-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .btn-refresh {
    margin-left: auto; padding: 3px 10px; border-radius: 6px;
    border: 1px solid var(--border); background: none; font-size: 10.5px;
    cursor: pointer; color: var(--text2); font-family: inherit;
    transition: all .15s; flex-shrink: 0;
  }
  .btn-refresh:hover { background: var(--bel-light); color: var(--bel); }
  .metrics-loading { color: var(--text3); font-style: italic; }

  /* ── EVENTS PANEL ── */
  .events-workspace {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg2);
  }
  .events-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0;
  }
  .events-grid {
    flex: 1; overflow-y: auto; padding: 16px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px; align-content: start;
  }
  .ev-card {
    background: #fff; border-radius: 10px; padding: 16px;
    border: 1px solid var(--border); transition: box-shadow .15s, border-color .15s;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ev-card:hover { box-shadow: var(--shadow); border-color: #b8c4e8; }
  .ev-card-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .ev-card-date { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
  .ev-card-link {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    color: var(--bel); font-weight: 600; text-decoration: none; margin-top: 4px;
  }
  .ev-card-link:hover { text-decoration: underline; }
  .ev-card-num { font-size: 10px; color: var(--text3); background: var(--bg2); border-radius: 5px; padding: 2px 7px; align-self: flex-start; }
  .events-empty { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; color: var(--text3); }
  .btn-events-panel {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 7px; font-size: 11.5px; border-radius: 7px;
    cursor: pointer; font-weight: 600; font-family: inherit; transition: all .15s;
    border: 1.5px solid; margin-bottom: 4px;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURACIÓN — edita aquí tus usuarios
// ══════════════════════════════════════════════
const CONFIG = {
  usuarios: [
    { id:"admin",    email:"admin@boletaenlinea.co",          pass:"admin2024",   nombre:"Administrador",       rol:"admin", dept:null,            av:"AD" },
    { id:"cont",     email:"contabilidad@boletaenlinea.co",   pass:"cont2024",    nombre:"Contabilidad",        rol:"user",  dept:"contabilidad",   av:"CO" },
    { id:"oper",     email:"operaciones@boletaenlinea.co",    pass:"oper2024",    nombre:"Operaciones",         rol:"user",  dept:"operaciones",    av:"OP" },
    { id:"comun",    email:"comunicaciones@boletaenlinea.co", pass:"com2024",     nombre:"Comunicaciones",      rol:"user",  dept:"comunicaciones", av:"CM" },
    { id:"ger",      email:"gerencia@boletaenlinea.co",       pass:"ger2024",     nombre:"Gerencia Comercial",  rol:"user",  dept:"gerencia",       av:"GC" },
  ],
  departamentos: [
    { id:"contabilidad",   label:"Contabilidad",       color:"#1565C0", iconPath:'M9 7H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-3M9 11l3 3L22 4' },
    { id:"operaciones",    label:"Operaciones",         color:"#2E7D32", iconPath:'M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z' },
    { id:"comunicaciones", label:"Comunicaciones",      color:"#6A1B9A", iconPath:'M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.89L15 14M3 8a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8z' },
    { id:"gerencia",       label:"Gerencia Comercial",  color:"#E65100", iconPath:'M3 3v18h18M9 17V9m4 8V5m4 12v-3' },
  ]
};

// ══════════════════════════════════════════════
//  PÁGINAS DEMO POR DEPARTAMENTO
// ══════════════════════════════════════════════
const DEMO = {
  contabilidad: [
    { id:"liq", title:"Liquidación de Eventos", content: genPageContabilidad1() },
    { id:"gas", title:"Informe de Gastos",       content: genPageContabilidad2() },
  ],
  operaciones: [
    { id:"ev",  title:"Eventos Activos",          content: genPageOperaciones1() },
    { id:"pro", title:"Protocolo de Operación",   content: genPageOperaciones2() },
  ],
  comunicaciones: [
    { id:"kit", title:"Kit de Marca Digital",     content: genPageComunicaciones1() },
    { id:"cal", title:"Calendario Editorial",     content: genPageComunicaciones2() },
  ],
  gerencia: [
    { id:"kpi", title:"KPIs Comerciales",         content: genPageGerencia1() },
    { id:"pie", title:"Pipeline de Ventas",       content: genPageGerencia2() },
  ]
};

// ══════════════════════════════════════════════
//  ESTADO GLOBAL
// ══════════════════════════════════════════════
let S = {
  user: null,
  pages: {},
  dept: null,
  pageId: null,
  view: "preview",   // preview | editor | split
  addOpen: false,
  newTitle: "",
  renaming: null,
  renVal: "",
  delTarget: null,
  saved: false,
  events: [],
  eventsTotal: 0,
  eventsLoaded: false,
  eventsError: null,
  eventsPanel: false,
};

// ══════════════════════════════════════════════
//  PERSISTENCIA  (localStorage)
// ══════════════════════════════════════════════
const LS_PAGES = "bel_pages_v5";
const LS_SESS  = "bel_sess_v5";

function loadData() {
  try {
    const sess = localStorage.getItem(LS_SESS);
    if (sess) {
      const u = JSON.parse(sess);
      S.user = CONFIG.usuarios.find(x => x.id === u.id) || null;
    }
  } catch(e) {}
  try {
    const pg = localStorage.getItem(LS_PAGES);
    S.pages = pg ? JSON.parse(pg) : JSON.parse(JSON.stringify(DEMO));
  } catch(e) {
    S.pages = JSON.parse(JSON.stringify(DEMO));
  }
  if (S.user) {
    const avail = availDepts();
    S.dept = avail[0]?.id || null;
    if (S.dept) S.pageId = (S.pages[S.dept]||[])[0]?.id || null;
  }
}

function savePages() {
  localStorage.setItem(LS_PAGES, JSON.stringify(S.pages));
  S.saved = true;
  render();
  setTimeout(() => { S.saved = false; render(); }, 2000);
}

// ── INTEGRACIÓN BOLETAENLINEA.CO ──
function updateEventPages() {
  if (!S.eventsLoaded || S.eventsError) return;
  const ev = S.events, tot = S.eventsTotal;
  ['operaciones'].forEach(dept => {
    if (S.pages[dept]) {
      S.pages[dept] = S.pages[dept].map(p =>
        p.id === 'ev' ? { ...p, content: genPageOperaciones1(ev, tot) } : p
      );
    }
  });
  ['gerencia'].forEach(dept => {
    if (S.pages[dept]) {
      S.pages[dept] = S.pages[dept].map(p =>
        p.id === 'kpi' ? { ...p, content: genPageGerencia1(ev, tot) } : p
      );
    }
  });
}

async function fetchEvents() {
  S.eventsLoaded = false;
  S.eventsError = null;
  render();
  try {
    const res = await fetch(
      'https://boletaenlinea.co/wp-json/wp/v2/tc_events?per_page=20&_fields=id,title,date,link&orderby=date&order=desc',
      { mode: 'cors' }
    );
    if (!res.ok) throw new Error(res.status);
    const total = parseInt(res.headers.get('X-WP-Total') || '0', 10);
    const data = await res.json();
    S.events = data;
    S.eventsTotal = total;
    S.eventsLoaded = true;
    S.eventsError = null;
  } catch(e) {
    S.eventsError = 'Sin conexión con boletaenlinea.co';
    S.eventsLoaded = true;
    S.events = [];
    S.eventsTotal = 0;
  }
  updateEventPages();
  render();
  updatePreview();
}

function login(user) {
  S.user = user;
  localStorage.setItem(LS_SESS, JSON.stringify({ id: user.id }));
  const avail = availDepts();
  S.dept = avail[0]?.id || null;
  if (S.dept) S.pageId = (S.pages[S.dept]||[])[0]?.id || null;
  render();
  fetchEvents();
}

function logout() {
  localStorage.removeItem(LS_SESS);
  S.user = null; S.dept = null; S.pageId = null;
  render();
}

// ══════════════════════════════════════════════
function availDepts() {
  if (!S.user) return [];
  return S.user.rol === "admin"
    ? CONFIG.departamentos
    : CONFIG.departamentos.filter(d => d.id === S.user.dept);
}
function currentDept() { return CONFIG.departamentos.find(d => d.id === S.dept); }
function currentPages() { return S.pages[S.dept] || []; }
function activePage() { return currentPages().find(p => p.id === S.pageId); }

function setDept(id) {
  S.dept = id;
  const list = S.pages[id] || [];
  S.pageId = list[0]?.id || null;
  S.addOpen = false; S.renaming = null; S.eventsPanel = false;
  render();
}
function setPage(id) {
  S.pageId = id;
  S.renaming = null;
  S.eventsPanel = false;
  render();
}
function setView(v) { S.view = v; render(); updatePreview(); }

function addPage() {
  const t = S.newTitle.trim();
  if (!t) return;
  const d = currentDept();
  const id = "p" + Date.now();
  const newP = {
    id, title: t,
    content: templateBlank(t, d?.label || "", d?.color || "#0D1E8D")
  };
  S.pages[S.dept] = [...(S.pages[S.dept]||[]), newP];
  S.pageId = id; S.newTitle = ""; S.addOpen = false;
  render(); updatePreview();
}

function deletePage(id) {
  const list = (S.pages[S.dept]||[]).filter(p => p.id !== id);
  S.pages[S.dept] = list;
  S.pageId = list[0]?.id || null;
  S.delTarget = null;
  render(); updatePreview();
}

function applyRename() {
  const t = S.renVal.trim();
  if (t) {
    S.pages[S.dept] = (S.pages[S.dept]||[]).map(p =>
      p.id === S.renaming ? { ...p, title: t } : p
    );
  }
  S.renaming = null; render();
}

function updateContent(val) {
  S.pages[S.dept] = (S.pages[S.dept]||[]).map(p =>
    p.id === S.pageId ? { ...p, content: val } : p
  );
  // live preview
  const frame = document.querySelector(".preview-frame");
  if (frame) frame.srcdoc = val;
}

function updatePreview() {
  const frame = document.querySelector(".preview-frame");
  const pg = activePage();
  if (frame && pg) frame.srcdoc = pg.content;
}

function openInTab() {
  const pg = activePage();
  if (!pg) return;
  const b = new Blob([pg.content], { type: "text/html" });
  window.open(URL.createObjectURL(b), "_blank");
}

      </div>

      <div class="login-shortcuts">
        <p>Accesos rápidos (demo):</p>

      </div>

  </div>`;
}

function bindLogin() {
  document.getElementById("btn-login").onclick = doLogin;
  document.getElementById("inp-pass").onkeydown = e => { if (e.key === "Enter") doLogin(); };
  document.getElementById("inp-email").onkeydown = e => { if (e.key === "Enter") doLogin(); };
  document.querySelectorAll(".shortcut-btn").forEach(btn => {
    btn.onclick = () => {
      document.getElementById("inp-email").value = btn.dataset.email;
      document.getElementById("inp-pass").value = btn.dataset.pass;
      document.getElementById("login-err").style.display = "none";
      document.getElementById("inp-email").classList.remove("error");
      document.getElementById("inp-pass").classList.remove("error");
    };
  });
}

function doLogin() {
  const em = document.getElementById("inp-email").value.trim().toLowerCase();
  const pw = document.getElementById("inp-pass").value;
  const u = CONFIG.usuarios.find(x => x.email === em && x.pass === pw);
  if (u) {
    login(u);
  } else {
    document.getElementById("inp-email").classList.add("error");
    document.getElementById("inp-pass").classList.add("error");
    const err = document.getElementById("login-err");
    document.getElementById("login-err-txt").textContent = "Correo o contraseña incorrectos";
    err.style.display = "flex";
  }
}

// ── EVENT BINDING ──
function bindPortal() {
  // Header
  document.getElementById("btn-save")?.addEventListener("click", savePages);
  document.getElementById("btn-logout")?.addEventListener("click", logout);

  // Dept tabs
  document.querySelectorAll(".dept-tab").forEach(btn => {
    btn.addEventListener("click", () => setDept(btn.dataset.dept));
  });

  // Page items
  document.querySelectorAll(".page-item").forEach(item => {
    item.addEventListener("click", () => {
      if (S.renaming) return;
      setPage(item.dataset.pid);
    });
    item.addEventListener("dblclick", () => {
      const p = currentPages().find(x => x.id === item.dataset.pid);
      if (p) { S.renaming = p.id; S.renVal = p.title; render(); bindPortal(); focusRename(); }
    });
  });

  // Delete buttons on page items
  document.querySelectorAll(".page-del").forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      const p = currentPages().find(x => x.id === btn.dataset.del);
      if (p) { S.delTarget = p; render(); bindPortal(); }
    });
  });

  // Rename input
  const ri = document.getElementById("rename-input");
  if (ri) {
    ri.focus(); ri.select();
    ri.addEventListener("keydown", e => {
      if (e.key === "Enter") { S.renVal = ri.value; applyRename(); }
      if (e.key === "Escape") { S.renaming = null; render(); bindPortal(); }
    });
    ri.addEventListener("blur", () => { S.renVal = ri.value; applyRename(); });
    ri.addEventListener("input", e => { S.renVal = e.target.value; });
  }

  // Add page
  document.getElementById("btn-new-page")?.addEventListener("click", () => {
    S.addOpen = true; render(); bindPortal();
    document.getElementById("add-input")?.focus();
  });
  const ai = document.getElementById("add-input");
  if (ai) {
    ai.addEventListener("input", e => { S.newTitle = e.target.value; });
    ai.addEventListener("keydown", e => {
      if (e.key === "Enter") { S.newTitle = ai.value; addPage(); }
      if (e.key === "Escape") { S.addOpen = false; S.newTitle = ""; render(); bindPortal(); }
    });
  }
  document.getElementById("btn-create")?.addEventListener("click", () => {
    const ai2 = document.getElementById("add-input");
    if (ai2) S.newTitle = ai2.value;
    addPage();
  });
  document.getElementById("btn-cancel-add")?.addEventListener("click", () => {
    S.addOpen = false; S.newTitle = ""; render(); bindPortal();
  });

  // Events panel buttons
  const bindEventsRefresh = id => {
    document.getElementById(id)?.addEventListener("click", () => fetchEvents());
  };
  bindEventsRefresh("btn-refresh-events");
  bindEventsRefresh("btn-refresh-events-2");
  bindEventsRefresh("btn-refresh-events-3");

  document.getElementById("btn-events-panel")?.addEventListener("click", () => {
    S.eventsPanel = !S.eventsPanel;
    render(); bindPortal();
  });
  document.getElementById("btn-close-events")?.addEventListener("click", () => {
    S.eventsPanel = false;
    render(); bindPortal();
  });

  // View buttons
  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.addEventListener("click", () => setView(btn.dataset.view));
  });

  // Open in tab
  document.getElementById("btn-open")?.addEventListener("click", openInTab);

  // Code editor
  const ed = document.getElementById("code-editor");
  if (ed) {
    ed.addEventListener("input", () => {
      updateContent(ed.value);
      const cc = document.getElementById("char-count");
      if (cc) cc.textContent = ed.value.length + " caracteres";
    });
    ed.addEventListener("keydown", e => {
      if (e.key === "Tab") {
        e.preventDefault();
        const s = ed.selectionStart, end = ed.selectionEnd;
        ed.value = ed.value.substring(0,s) + "  " + ed.value.substring(end);
        ed.selectionStart = ed.selectionEnd = s + 2;
        updateContent(ed.value);
      }
    });
  }

  // Delete modal
  document.getElementById("btn-modal-cancel")?.addEventListener("click", () => {
    S.delTarget = null; render(); bindPortal();
  });
  document.getElementById("btn-modal-del")?.addEventListener("click", () => {
    deletePage(S.delTarget.id);
  });
  document.getElementById("modal-overlay")?.addEventListener("click", e => {
    if (e.target.id === "modal-overlay") { S.delTarget = null; render(); bindPortal(); }
  });
}

function focusRename() {
  const ri = document.getElementById("rename-input");
  if (ri) { ri.focus(); ri.select(); }
}
